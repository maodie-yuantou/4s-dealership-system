services:
  mysql:
    image: mysql:8.0
    container_name: mysql-project
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: project1
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: 4s-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 64mb
    volumes:
      - redis-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: 4s-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: 4s-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-server.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-client/dist:/usr/share/nginx/html/client:ro
      - ./frontend/dist:/usr/share/nginx/html/admin:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: 4s-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: pgvector/pgvector:0.7.0-pg16
    container_name: 4s-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cardealership_vectors
      POSTGRES_USER: vectoruser
      POSTGRES_PASSWORD: vectorpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/sql/pgvector-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  postgres-data:
