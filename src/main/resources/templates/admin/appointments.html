<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - 润达4S店 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <h3 class="mb-4">预约管理</h3>
    <div id="appointmentTable"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadAll() {
    const res = await fetch('/appointments/api/all');
    const result = await res.json();
    const container = document.getElementById('appointmentTable');
    if (result.code !== 200 || !result.data.records.length) {
        container.innerHTML = '<div class="text-center py-5"><p class="text-muted">暂无预约</p></div>';
        return;
    }
    const statusMap = { PENDING: '待确认', CONFIRMED: '已确认', COMPLETED: '已完成', CANCELLED: '已取消' };
    const purposeMap = { TEST_DRIVE: '试驾', CONSULTATION: '到店咨询', MAINTENANCE: '保养维修' };

    container.innerHTML = `<div class="table-responsive"><table class="table table-hover">
        <thead><tr><th>用户</th><th>车辆</th><th>时间</th><th>目的</th><th>备注</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${result.data.records.map(a => `<tr>
            <td>${a.userName}</td>
            <td>${a.vehicleInfo}</td>
            <td>${a.appointmentTime}</td>
            <td>${purposeMap[a.purpose] || a.purpose}</td>
            <td>${a.notes || ''}</td>
            <td>${statusMap[a.status] || a.status}</td>
            <td>
                ${a.status === 'PENDING' ? `<button class="btn btn-sm btn-success me-1" onclick="updateStatus(${a.id},'CONFIRMED')">确认</button>
                <button class="btn btn-sm btn-danger" onclick="updateStatus(${a.id},'CANCELLED')">取消</button>` : ''}
                ${a.status === 'CONFIRMED' ? `<button class="btn btn-sm btn-secondary" onclick="updateStatus(${a.id},'COMPLETED')">完成</button>` : ''}
            </td>
        </tr>`).join('')}</tbody>
    </table></div>`;
}

async function updateStatus(id, status) {
    await fetch(`/appointments/api/${id}/status?status=${status}`, { method: 'PUT' });
    loadAll();
}

loadAll();
</script>
</body>
</html>
