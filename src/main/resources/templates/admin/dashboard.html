<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <h3 class="mb-4">管理后台</h3>
    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm">
                <div class="card-body text-center py-4">
                    <h5>车辆管理</h5>
                    <p class="text-muted small">管理在售车辆信息</p>
                    <a href="/admin/vehicles" class="btn btn-primary btn-sm">进入</a>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm">
                <div class="card-body text-center py-4">
                    <h5>预约管理</h5>
                    <p class="text-muted small">查看处理客户预约</p>
                    <a href="/appointments/manage" class="btn btn-primary btn-sm">进入</a>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm">
                <div class="card-body text-center py-4">
                    <h5>用户管理</h5>
                    <p class="text-muted small">管理注册用户</p>
                    <a href="/admin/users" class="btn btn-primary btn-sm">进入</a>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card shadow-sm">
                <div class="card-body text-center py-4">
                    <h5>公告管理</h5>
                    <p class="text-muted small">发布和管理公告</p>
                    <a href="/admin/news" class="btn btn-primary btn-sm">进入</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
