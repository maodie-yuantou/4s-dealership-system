<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 润达4S店 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>公告管理</h3>
        <button class="btn btn-primary" onclick="showAddModal()">发布公告</button>
    </div>
    <div id="newsTable"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">发布/编辑公告</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newsForm">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label class="form-label">标题</label>
                        <input name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">内容</label>
                        <textarea name="content" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select name="status" class="form-select">
                            <option value="PUBLISHED">发布</option>
                            <option value="DRAFT">草稿</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveNews()">保存</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let modal;
document.addEventListener('DOMContentLoaded', () => { modal = new bootstrap.Modal('#newsModal'); loadNews(); });

async function loadNews() {
    const res = await fetch('/news/api/all');
    const result = await res.json();
    const container = document.getElementById('newsTable');
    if (!result.data.records.length) {
        container.innerHTML = '<p class="text-muted text-center py-5">暂无公告</p>';
        return;
    }
    container.innerHTML = `<div class="table-responsive"><table class="table table-hover">
        <thead><tr><th>ID</th><th>标题</th><th>发布者</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
        <tbody>${result.data.records.map(n => `<tr>
            <td>${n.id}</td><td>${n.title}</td><td>${n.publisherName || ''}</td>
            <td>${n.status === 'PUBLISHED' ? '<span class="text-success">已发布</span>' : '<span class="text-muted">草稿</span>'}</td>
            <td>${n.createdAt}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary me-1" onclick="editNews(${n.id},'${n.title}','${n.content.replace(/'/g,"\\'").replace(/\n/g,"\\n")}','${n.status}')">编辑</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteNews(${n.id})">删除</button>
            </td>
        </tr>`).join('')}</tbody></table></div>`;
}

function showAddModal() {
    document.getElementById('newsForm').reset();
    modal.show();
}

function editNews(id, title, content, status) {
    const form = document.getElementById('newsForm');
    form.id.value = id;
    form.title.value = title;
    form.content.value = content;
    form.status.value = status;
    modal.show();
}

async function saveNews() {
    const form = document.getElementById('newsForm');
    const data = Object.fromEntries(new FormData(form));
    const isEdit = data.id;
    const url = isEdit ? `/news/api/${data.id}` : '/news/api';
    const method = isEdit ? 'PUT' : 'POST';
    await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    modal.hide();
    loadNews();
}

async function deleteNews(id) {
    if (!confirm('确定删除？')) return;
    await fetch(`/news/api/${id}`, { method: 'DELETE' });
    loadNews();
}
</script>
</body>
</html>
