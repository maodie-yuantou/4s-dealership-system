<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 润达4S店 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <h3 class="mb-4">用户管理</h3>
    <div id="userTable"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadUsers() {
    const res = await fetch('/user/api/list');
    const result = await res.json();
    const container = document.getElementById('userTable');
    if (!result.data.records.length) {
        container.innerHTML = '<p class="text-muted text-center py-5">暂无用户</p>';
        return;
    }
    container.innerHTML = `<div class="table-responsive"><table class="table table-hover">
        <thead><tr><th>ID</th><th>用户名</th><th>姓名</th><th>手机号</th><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody>${result.data.records.map(u => `<tr>
            <td>${u.id}</td><td>${u.username}</td><td>${u.realName || ''}</td><td>${u.phone || ''}</td><td>${u.email || ''}</td>
            <td>${u.role === 'ADMIN' ? '管理员' : u.role === 'SALES' ? '销售' : '用户'}</td>
            <td>${u.status === 1 ? '<span class="text-success">正常</span>' : '<span class="text-danger">禁用</span>'}</td>
            <td>${u.createdAt}</td>
            <td>${u.role !== 'ADMIN' && u.role !== 'SALES' ?
                (u.status === 1 ? `<button class="btn btn-sm btn-danger" onclick="toggleStatus(${u.id},0)">禁用</button>` :
                `<button class="btn btn-sm btn-success" onclick="toggleStatus(${u.id},1)">启用</button>`) : '-'}
            </td>
        </tr>`).join('')}</tbody></table></div>`;
}

async function toggleStatus(id, status) {
    await fetch(`/user/api/${id}/status?status=${status}`, { method: 'PUT' });
    loadUsers();
}

loadUsers();
</script>
</body>
</html>
