<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆管理 - 润达4S店 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>车辆管理</h3>
        <button class="btn btn-primary" onclick="showAddModal()">添加车辆</button>
    </div>
    <div id="vehicleTable"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="vehicleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加车辆</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="vehicleForm">
                    <input type="hidden" name="id">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">品牌</label>
                            <input name="brand" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">型号</label>
                            <input name="model" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">年份</label>
                            <input name="year" type="number" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">价格(万)</label>
                            <input name="price" type="number" step="0.01" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">类型</label>
                            <select name="type" class="form-select">
                                <option value="轿车">轿车</option>
                                <option value="SUV">SUV</option>
                                <option value="MPV">MPV</option>
                                <option value="新能源">新能源</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">状态</label>
                            <select name="status" class="form-select">
                                <option value="ON_SALE">在售</option>
                                <option value="SOLD">已售</option>
                                <option value="RESERVED">已预订</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">颜色</label>
                            <input name="color" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">发动机</label>
                            <input name="engine" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">变速箱</label>
                            <input name="transmission" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">燃油类型</label>
                            <input name="fuelType" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">库存</label>
                            <input name="stock" type="number" class="form-control" value="1">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">描述</label>
                            <textarea name="description" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveVehicle()">保存</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let modal;
document.addEventListener('DOMContentLoaded', () => { modal = new bootstrap.Modal('#vehicleModal'); loadAll(); });

async function loadAll() {
    const res = await fetch('/vehicles/api/list?size=50');
    const result = await res.json();
    const container = document.getElementById('vehicleTable');
    if (!result.data.records.length) {
        container.innerHTML = '<p class="text-muted text-center py-5">暂无车辆数据</p>';
        return;
    }
    container.innerHTML = `<div class="table-responsive"><table class="table table-hover">
        <thead><tr><th>ID</th><th>品牌</th><th>型号</th><th>年份</th><th>价格(万)</th><th>类型</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${result.data.records.map(v => `<tr>
            <td>${v.id}</td><td>${v.brand}</td><td>${v.model}</td><td>${v.year}</td>
            <td>${v.price}</td><td>${v.type}</td><td>${v.status}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary me-1" onclick='editVehicle(${JSON.stringify(v)})'>编辑</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteVehicle(${v.id})">删除</button>
            </td>
        </tr>`).join('')}</tbody></table></div>`;
}

function showAddModal() {
    document.getElementById('vehicleForm').reset();
    document.getElementById('modalTitle').textContent = '添加车辆';
    document.querySelector('input[name="id"]').value = '';
    modal.show();
}

function editVehicle(v) {
    document.getElementById('modalTitle').textContent = '编辑车辆';
    const form = document.getElementById('vehicleForm');
    Object.keys(v).forEach(key => {
        const el = form.querySelector(`[name="${key}"]`);
        if (el && v[key] != null) el.value = v[key];
    });
    modal.show();
}

async function saveVehicle() {
    const form = document.getElementById('vehicleForm');
    const data = Object.fromEntries(new FormData(form));
    data.id = data.id ? parseInt(data.id) : null;
    data.year = parseInt(data.year);
    data.price = parseFloat(data.price);
    data.stock = parseInt(data.stock);
    const url = '/admin/api/vehicles';
    const method = 'POST';
    await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    modal.hide();
    loadAll();
}

async function deleteVehicle(id) {
    if (!confirm('确定删除？')) return;
    await fetch(`/admin/api/vehicles/${id}`, { method: 'DELETE' });
    loadAll();
}
</script>
</body>
</html>
