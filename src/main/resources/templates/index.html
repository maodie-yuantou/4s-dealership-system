<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<!-- Hero Banner -->
<div class="bg-primary text-white py-5">
    <div class="container text-center">
        <h1 class="display-4 fw-bold">欢迎来到润达4S店</h1>
        <p class="lead mt-3">品质保障 · 专业服务 · 诚信经营</p>
        <a href="/vehicles" class="btn btn-light btn-lg mt-3">浏览车型</a>
    </div>
</div>

<!-- Features -->
<div class="container my-5">
    <div class="row text-center">
        <div class="col-md-3 mb-4">
            <a href="/vehicles" class="text-decoration-none">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title">热门车型</h5>
                    <p class="card-text text-muted">轿车、SUV、新能源等多样选择</p>
                </div>
            </div>
            </a>
        </div>
        <div class="col-md-3 mb-4">
            <a href="/user/ai-chat" class="text-decoration-none">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title">AI智能咨询</h5>
                    <p class="card-text text-muted">DeepSeek AI 帮您选车购车</p>
                </div>
            </div>
            </a>
        </div>
        <div class="col-md-3 mb-4">
            <a href="/vehicles" class="text-decoration-none">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title">在线预约</h5>
                    <p class="card-text text-muted">随时随地预约试驾</p>
                </div>
            </div>
            </a>
        </div>
        <div class="col-md-3 mb-4">
            <a href="/user/ai-chat" class="text-decoration-none">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title">专业售后</h5>
                    <p class="card-text text-muted">全方位售后服务保障</p>
                </div>
            </div>
            </a>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
