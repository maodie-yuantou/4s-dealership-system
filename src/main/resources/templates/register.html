<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">用户注册</h3>
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <div id="successMsg" class="alert alert-success d-none"></div>
                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">用户名 *</label>
                            <input type="text" name="username" class="form-control" placeholder="3-20位字符">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码 *</label>
                            <input type="password" name="password" class="form-control" placeholder="6-20位字符">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" name="realName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" name="phone" class="form-control" placeholder="选填，11位手机号">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="text" name="email" class="form-control" placeholder="选填">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">注册</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/login">已有账号？立即登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    var errMsg = document.getElementById('errorMsg');
    var succMsg = document.getElementById('successMsg');
    errMsg.classList.add('d-none');
    succMsg.classList.add('d-none');

    var username = e.target.username.value.trim();
    var password = e.target.password.value.trim();
    var phone = e.target.phone.value.trim();

    if (!username || username.length < 3 || username.length > 20) {
        errMsg.textContent = '用户名不能为空，长度3-20位';
        errMsg.classList.remove('d-none');
        return;
    }
    if (!password || password.length < 6 || password.length > 20) {
        errMsg.textContent = '密码不能为空，长度6-20位';
        errMsg.classList.remove('d-none');
        return;
    }
    if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
        errMsg.textContent = '手机号格式不正确，请输入11位手机号';
        errMsg.classList.remove('d-none');
        return;
    }

    var data = {
        username: username,
        password: password,
        realName: e.target.realName.value.trim(),
        phone: phone,
        email: e.target.email.value.trim()
    };
    try {
        var res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        var result = await res.json();
        if (result.code === 200) {
            succMsg.textContent = '注册成功！3秒后跳转到登录页...';
            succMsg.classList.remove('d-none');
            setTimeout(function() { window.location.href = '/login'; }, 3000);
        } else {
            errMsg.textContent = result.message;
            errMsg.classList.remove('d-none');
        }
    } catch (ex) {
        errMsg.textContent = '网络异常，请稍后再试';
        errMsg.classList.remove('d-none');
    }
});
</script>
</body>
</html>
