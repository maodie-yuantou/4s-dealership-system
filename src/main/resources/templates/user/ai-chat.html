<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能咨询 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">AI 智能咨询 - 小润</h5>
                    <small>基于 DeepSeek AI，为您解答购车、用车相关问题</small>
                </div>
                <div class="card-body p-0">
                    <div id="chatContainer" class="chat-container p-3">
                        <div class="chat-message system">
                            <div class="chat-bubble system">
                                您好！我是润达4S店的AI助手小润，很高兴为您服务！
                                我可以帮您推荐车型、对比配置、解答购车流程等问题，请问有什么可以帮您的？
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="questionInput" class="form-control"
                               placeholder="请输入您想咨询的问题..." onkeypress="if(event.keyCode===13)sendMessage()">
                        <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const chatContainer = document.getElementById('chatContainer');
const input = document.getElementById('questionInput');

function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `chat-message ${role}`;
    div.innerHTML = `<div class="chat-bubble ${role}">${content}</div>`;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage() {
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    addMessage('user', question);

    const loading = document.createElement('div');
    loading.className = 'chat-message system';
    loading.innerHTML = '<div class="chat-bubble system"><em>正在思考...</em></div>';
    chatContainer.appendChild(loading);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
        const res = await fetch('/user/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question })
        });
        const result = await res.json();
        loading.remove();
        if (result.code === 200) {
            addMessage('system', result.data);
        } else {
            addMessage('system', '抱歉，出现了一些问题: ' + result.message);
        }
    } catch (err) {
        loading.remove();
        addMessage('system', '网络异常，请稍后再试');
    }
}
</script>
</body>
</html>
