<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <h3 class="mb-4">我的预约</h3>
    <div id="appointmentList"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadAppointments() {
    const res = await fetch('/appointments/api/user');
    const result = await res.json();
    const container = document.getElementById('appointmentList');
    if (result.code !== 200 || !result.data.records.length) {
        container.innerHTML = '<div class="text-center py-5"><p class="text-muted">暂无预约记录</p></div>';
        return;
    }
    const statusMap = { PENDING: '待确认', CONFIRMED: '已确认', COMPLETED: '已完成', CANCELLED: '已取消' };
    const statusClass = { PENDING: 'bg-warning', CONFIRMED: 'bg-success', COMPLETED: 'bg-secondary', CANCELLED: 'bg-danger' };
    const purposeMap = { TEST_DRIVE: '试驾', CONSULTATION: '到店咨询', MAINTENANCE: '保养维修' };

    container.innerHTML = result.data.records.map(a => `<div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6>${a.vehicleInfo || '车辆信息'}</h6>
                    <p class="mb-1 text-muted small">预约时间: ${a.appointmentTime}</p>
                    <p class="mb-1 text-muted small">目的: ${purposeMap[a.purpose] || a.purpose}</p>
                    <p class="mb-0 text-muted small">备注: ${a.notes || '无'}</p>
                </div>
                <span class="badge ${statusClass[a.status] || 'bg-secondary'}">${statusMap[a.status] || a.status}</span>
            </div>
        </div>
    </div>`).join('');
}
loadAppointments();
</script>
</body>
</html>
