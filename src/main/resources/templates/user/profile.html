<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header"><h5 class="mb-0">个人信息</h5></div>
                <div class="card-body">
                    <div id="profileMsg" class="alert d-none"></div>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" id="username" class="form-control" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" id="realName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" id="phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" id="email" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header"><h5 class="mb-0">修改密码</h5></div>
                <div class="card-body">
                    <div id="pwdMsg" class="alert d-none"></div>
                    <form id="pwdForm">
                        <div class="mb-3">
                            <label class="form-label">原密码</label>
                            <input type="password" name="oldPwd" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" name="newPwd" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-warning">修改密码</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadProfile() {
    const res = await fetch('/api/auth/me');
    const result = await res.json();
    if (result.code === 200) {
        document.getElementById('username').value = result.data.username;
        document.getElementById('realName').value = result.data.realName || '';
        document.getElementById('phone').value = result.data.phone || '';
        document.getElementById('email').value = result.data.email || '';
    }
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        realName: document.getElementById('realName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value
    };
    const res = await fetch('/user/api/profile', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await res.json();
    const msg = document.getElementById('profileMsg');
    msg.classList.remove('d-none');
    if (result.code === 200) {
        msg.className = 'alert alert-success';
        msg.textContent = '保存成功';
    } else {
        msg.className = 'alert alert-danger';
        msg.textContent = result.message;
    }
});

document.getElementById('pwdForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const oldPwd = e.target.oldPwd.value;
    const newPwd = e.target.newPwd.value;
    const res = await fetch(`/user/api/password?oldPwd=${encodeURIComponent(oldPwd)}&newPwd=${encodeURIComponent(newPwd)}`, {
        method: 'PUT'
    });
    const result = await res.json();
    const msg = document.getElementById('pwdMsg');
    msg.classList.remove('d-none');
    if (result.code === 200) {
        msg.className = 'alert alert-success';
        msg.textContent = '密码修改成功';
        e.target.reset();
    } else {
        msg.className = 'alert alert-danger';
        msg.textContent = result.message;
    }
});

loadProfile();
</script>
</body>
</html>
