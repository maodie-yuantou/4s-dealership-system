<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车型展示 - 润达4S店</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container my-4">
    <!-- Search Filters -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/vehicles" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">品牌</label>
                    <select name="brand" class="form-select">
                        <option value="">全部品牌</option>
                        <option th:each="b : ${brands}" th:value="${b}"
                                th:text="${b}" th:selected="${b == selectedBrand}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">车型</label>
                    <select name="type" class="form-select">
                        <option value="">全部车型</option>
                        <option value="轿车" th:selected="${selectedType == '轿车'}">轿车</option>
                        <option value="SUV" th:selected="${selectedType == 'SUV'}">SUV</option>
                        <option value="MPV" th:selected="${selectedType == 'MPV'}">MPV</option>
                        <option value="新能源" th:selected="${selectedType == '新能源'}">新能源</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">筛选</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Vehicle Cards -->
    <div class="row">
        <div class="col-md-4 mb-4" th:each="v : ${vehicles}">
            <div class="card h-100 shadow-sm position-relative">
                <span class="vehicle-type-badge badge bg-primary" th:text="${v.type}">轿车</span>
                <div class="card-body">
                    <h5 class="card-title" th:text="${v.brand + ' ' + v.model}">品牌型号</h5>
                    <p class="text-muted small mb-2">
                        <span th:text="${v.year}">2026</span> 年 |
                        <span th:text="${v.engine}">1.5T</span> |
                        <span th:text="${v.transmission}">自动</span>
                    </p>
                    <p class="text-muted small" th:text="${v.color}">颜色</p>
                    <p class="price">
                        <small>¥</small>
                        <span th:text="${#numbers.formatDecimal(v.price, 0, 2)}">0</span>
                        <small>万</small>
                    </p>
                    <a th:href="@{/vehicles/{id}(id=${v.id})}" class="btn btn-outline-primary btn-sm">查看详情</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${vehicles == null or vehicles.isEmpty()}">
            <div class="text-center py-5">
                <p class="text-muted">暂无在售车型，请稍后再来</p>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage <= 1 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/vehicles(page=${currentPage - 1}, brand=${selectedBrand}, type=${selectedType})}">上一页</a>
            </li>
            <li class="page-item" th:classappend="${i == currentPage ? 'active' : ''}"
                th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a class="page-link" th:href="@{/vehicles(page=${i}, brand=${selectedBrand}, type=${selectedType})}" th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/vehicles(page=${currentPage + 1}, brand=${selectedBrand}, type=${selectedType})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
